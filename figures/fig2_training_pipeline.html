<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>训练流程全景图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', 'PingFang SC', sans-serif; }
</style>
</head>
<body>
<svg width="1400" height="700" viewBox="0 0 1400 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FAFBFF"/>
      <stop offset="100%" stop-color="#F0F4FF"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007AFF"/><stop offset="100%" stop-color="#0056CC"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34C759"/><stop offset="100%" stop-color="#248A3D"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF9500"/><stop offset="100%" stop-color="#E08600"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5856D6"/><stop offset="100%" stop-color="#3634A3"/>
    </linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF2D55"/><stop offset="100%" stop-color="#D70040"/>
    </linearGradient>
    <linearGradient id="g6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#AF52DE"/><stop offset="100%" stop-color="#8944AB"/>
    </linearGradient>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#007AFF"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#86868B"/>
    </marker>
  </defs>

  <rect width="1400" height="700" fill="url(#bg)"/>

  <!-- Title -->
  <text x="700" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1D1D1F" font-family="-apple-system, 'PingFang SC', sans-serif">LSTM+Attention 水质预测模型 — 训练流程全景</text>
  <text x="700" y="60" text-anchor="middle" font-size="12" fill="#86868B" font-family="-apple-system, 'PingFang SC', sans-serif">从原始4小时水质监测数据到模型训练产出的完整工程链路</text>

  <!-- ===== PHASE 1: Data ===== -->
  <g transform="translate(25, 90)" font-family="-apple-system, 'PingFang SC', sans-serif">
    <!-- Phase label -->
    <rect x="0" y="0" width="24" height="550" rx="12" fill="url(#g1)" opacity="0.15"/>
    <text x="12" y="290" text-anchor="middle" font-size="11" fill="#007AFF" font-weight="700" transform="rotate(-90, 12, 290)">数据准备</text>

    <!-- Card 1: Raw data -->
    <g transform="translate(36, 10)">
      <rect x="0" y="0" width="180" height="120" rx="14" fill="#fff" filter="url(#sh)"/>
      <rect x="0" y="0" width="180" height="36" rx="14" fill="url(#g1)"/>
      <rect x="0" y="22" width="180" height="14" fill="url(#g1)"/>
      <text x="90" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">① 原始数据加载</text>
      <text x="90" y="56" text-anchor="middle" font-size="10" fill="#1D1D1F" font-weight="500">load_station_data()</text>
      <text x="15" y="74" font-size="9" fill="#86868B">• 15站 × 4h级时序数据</text>
      <text x="15" y="88" font-size="9" fill="#86868B">• ~9万条监测记录</text>
      <text x="15" y="102" font-size="9" fill="#FF2D55">• DO异常值过滤(1~16mg/L)</text>
      <text x="15" y="114" font-size="9" fill="#86868B">• 线性插值填补NaN</text>
    </g>

    <!-- Arrow down -->
    <line x1="126" y1="138" x2="126" y2="158" stroke="#007AFF" stroke-width="2" marker-end="url(#arr)"/>

    <!-- Card 2: Feature engineering -->
    <g transform="translate(36, 166)">
      <rect x="0" y="0" width="180" height="140" rx="14" fill="#fff" filter="url(#sh)"/>
      <rect x="0" y="0" width="180" height="36" rx="14" fill="url(#g2)"/>
      <rect x="0" y="22" width="180" height="14" fill="url(#g2)"/>
      <text x="90" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">② 特征工程</text>
      <text x="90" y="56" text-anchor="middle" font-size="10" fill="#1D1D1F" font-weight="500">19维融合特征</text>

      <rect x="12" y="66" width="156" height="20" rx="5" fill="#E3F2FF"/>
      <text x="90" y="80" text-anchor="middle" font-size="9" fill="#007AFF">9个水质参数 (水温/pH/DO...)</text>
      <rect x="12" y="90" width="156" height="20" rx="5" fill="#E8FAE8"/>
      <text x="90" y="104" text-anchor="middle" font-size="9" fill="#34C759">4个周期编码 (sin/cos)</text>
      <rect x="12" y="114" width="156" height="20" rx="5" fill="#FFF3E0"/>
      <text x="90" y="128" text-anchor="middle" font-size="9" fill="#FF9500">6个滚动趋势 (DO_diff...)</text>
    </g>

    <!-- Arrow down -->
    <line x1="126" y1="314" x2="126" y2="334" stroke="#007AFF" stroke-width="2" marker-end="url(#arr)"/>

    <!-- Card 3: Normalize + Split -->
    <g transform="translate(36, 342)">
      <rect x="0" y="0" width="180" height="120" rx="14" fill="#fff" filter="url(#sh)"/>
      <rect x="0" y="0" width="180" height="36" rx="14" fill="url(#g3)"/>
      <rect x="0" y="22" width="180" height="14" fill="url(#g3)"/>
      <text x="90" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">③ 标准化 + 切分</text>
      <text x="15" y="56" font-size="9" fill="#1D1D1F" font-weight="500">StandardScaler</text>
      <text x="15" y="72" font-size="9" fill="#FF2D55" font-weight="500">⚠ 仅在训练集fit（防泄漏）</text>
      <text x="15" y="92" font-size="9" fill="#86868B">时间顺序切分:</text>
      <rect x="15" y="98" width="75" height="16" rx="4" fill="#007AFF" opacity="0.7"/>
      <text x="52" y="110" text-anchor="middle" font-size="8" fill="#fff" font-weight="500">Train 70%</text>
      <rect x="92" y="98" width="38" height="16" rx="4" fill="#FF9500" opacity="0.7"/>
      <text x="111" y="110" text-anchor="middle" font-size="8" fill="#fff" font-weight="500">Val 15%</text>
      <rect x="132" y="98" width="38" height="16" rx="4" fill="#FF2D55" opacity="0.7"/>
      <text x="151" y="110" text-anchor="middle" font-size="8" fill="#fff" font-weight="500">Test 15%</text>
    </g>

    <!-- Arrow down -->
    <line x1="126" y1="470" x2="126" y2="490" stroke="#007AFF" stroke-width="2" marker-end="url(#arr)"/>

    <!-- Card 4: Sliding window -->
    <g transform="translate(36, 498)">
      <rect x="0" y="0" width="180" height="90" rx="14" fill="#fff" filter="url(#sh)"/>
      <rect x="0" y="0" width="180" height="36" rx="14" fill="url(#g4)"/>
      <rect x="0" y="22" width="180" height="14" fill="url(#g4)"/>
      <text x="90" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">④ 滑动窗口</text>
      <text x="90" y="56" text-anchor="middle" font-size="10" fill="#1D1D1F" font-weight="500">create_sequences()</text>
      <text x="15" y="72" font-size="9" fill="#86868B">Lookback = 18步 (72h)</text>
      <text x="15" y="86" font-size="9" fill="#86868B">Forecast = 6步 (24h)</text>
    </g>
  </g>

  <!-- ===== Long horizontal arrow to Training ===== -->
  <line x1="246" y1="400" x2="310" y2="400" stroke="#007AFF" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- ===== PHASE 2: Training ===== -->
  <g transform="translate(320, 90)" font-family="-apple-system, 'PingFang SC', sans-serif">
    <rect x="0" y="0" width="24" height="550" rx="12" fill="url(#g4)" opacity="0.15"/>
    <text x="12" y="290" text-anchor="middle" font-size="11" fill="#5856D6" font-weight="700" transform="rotate(-90, 12, 290)">模型训练</text>

    <!-- Training main card -->
    <g transform="translate(36, 10)">
      <rect x="0" y="0" width="360" height="540" rx="16" fill="#fff" filter="url(#sh)"/>
      <rect x="0" y="0" width="360" height="44" rx="16" fill="url(#g4)"/>
      <rect x="0" y="28" width="360" height="16" fill="url(#g4)"/>
      <text x="180" y="30" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">⑤ 训练循环 (train_one_station)</text>

      <!-- Model init -->
      <g transform="translate(15, 58)">
        <rect x="0" y="0" width="330" height="52" rx="10" fill="#F8F7FF" stroke="#5856D6" stroke-width="0.8"/>
        <text x="165" y="18" text-anchor="middle" font-size="10" fill="#5856D6" font-weight="600">模型初始化</text>
        <text x="165" y="36" text-anchor="middle" font-size="9" fill="#86868B">WaterQualityLSTM(input=19, hidden=96, layers=2, forecast=6)</text>
        <text x="165" y="48" text-anchor="middle" font-size="9" fill="#86868B">SmoothL1Loss (Huber) | Adam (lr=1e-3, wd=1e-5)</text>
      </g>

      <!-- Training loop -->
      <g transform="translate(15, 122)">
        <rect x="0" y="0" width="330" height="280" rx="12" fill="#FAFAFA" stroke="#E5E5EA" stroke-width="1"/>
        <text x="165" y="20" text-anchor="middle" font-size="11" fill="#1D1D1F" font-weight="600">Epoch 循环 (max=200)</text>

        <!-- Forward pass -->
        <g transform="translate(15, 32)">
          <rect x="0" y="0" width="145" height="70" rx="8" fill="#E3F2FF" stroke="#007AFF" stroke-width="0.8"/>
          <text x="72" y="16" text-anchor="middle" font-size="9" fill="#007AFF" font-weight="600">训练阶段</text>
          <text x="72" y="32" text-anchor="middle" font-size="8" fill="#1D1D1F">model.train()</text>
          <text x="72" y="44" text-anchor="middle" font-size="8" fill="#1D1D1F">前向传播 → 计算loss</text>
          <text x="72" y="56" text-anchor="middle" font-size="8" fill="#1D1D1F">反向传播 → 梯度裁剪</text>
          <text x="72" y="66" text-anchor="middle" font-size="7" fill="#86868B">clip_grad_norm=1.0</text>
        </g>

        <!-- Validation -->
        <g transform="translate(170, 32)">
          <rect x="0" y="0" width="145" height="70" rx="8" fill="#FFF3E0" stroke="#FF9500" stroke-width="0.8"/>
          <text x="72" y="16" text-anchor="middle" font-size="9" fill="#FF9500" font-weight="600">验证阶段</text>
          <text x="72" y="32" text-anchor="middle" font-size="8" fill="#1D1D1F">model.eval()</text>
          <text x="72" y="44" text-anchor="middle" font-size="8" fill="#1D1D1F">no_grad → 计算val_loss</text>
          <text x="72" y="56" text-anchor="middle" font-size="8" fill="#1D1D1F">记录最佳模型状态</text>
        </g>

        <!-- LR Scheduler -->
        <g transform="translate(15, 114)">
          <rect x="0" y="0" width="300" height="44" rx="8" fill="#F0EEFF" stroke="#5856D6" stroke-width="0.8"/>
          <text x="150" y="16" text-anchor="middle" font-size="9" fill="#5856D6" font-weight="600">ReduceLROnPlateau 学习率调度</text>
          <text x="150" y="32" text-anchor="middle" font-size="9" fill="#86868B">验证loss不降 8 个epoch → lr × 0.5</text>
          <text x="150" y="42" text-anchor="middle" font-size="7" fill="#86868B">1e-3 → 5e-4 → 2.5e-4 → ...</text>
        </g>

        <!-- Early Stopping -->
        <g transform="translate(15, 170)">
          <rect x="0" y="0" width="300" height="44" rx="8" fill="#FFF0F0" stroke="#FF2D55" stroke-width="0.8"/>
          <text x="150" y="16" text-anchor="middle" font-size="9" fill="#FF2D55" font-weight="600">Early Stopping 早停机制</text>
          <text x="150" y="32" text-anchor="middle" font-size="9" fill="#86868B">验证loss不降 20 个epoch → 停止训练</text>
          <text x="150" y="42" text-anchor="middle" font-size="7" fill="#86868B">恢复best_epoch的模型权重</text>
        </g>

        <!-- Epoch stats -->
        <g transform="translate(15, 226)">
          <rect x="0" y="0" width="300" height="40" rx="8" fill="#E8FAE8" stroke="#34C759" stroke-width="0.8"/>
          <text x="150" y="16" text-anchor="middle" font-size="9" fill="#34C759" font-weight="600">7站训练统计</text>
          <text x="150" y="32" text-anchor="middle" font-size="8" fill="#86868B">best_epoch: 4~22 | 总epoch: 24~42 | 耗时: 29~172秒</text>
        </g>
      </g>

      <!-- Test evaluation -->
      <g transform="translate(15, 416)">
        <rect x="0" y="0" width="330" height="110" rx="10" fill="#FFF0F5" stroke="#FF2D55" stroke-width="1"/>
        <text x="165" y="20" text-anchor="middle" font-size="11" fill="#FF2D55" font-weight="600">测试集评估</text>

        <text x="20" y="42" font-size="9" fill="#1D1D1F">反标准化 → DO真实值域 (mg/L)</text>
        <text x="20" y="58" font-size="9" fill="#1D1D1F">逐步评估: 4h / 8h / 12h / 16h / 20h / 24h</text>

        <g transform="translate(20, 68)">
          <rect x="0" y="0" width="68" height="30" rx="6" fill="#007AFF" opacity="0.1"/>
          <text x="34" y="13" text-anchor="middle" font-size="8" fill="#007AFF" font-weight="600">MAE</text>
          <text x="34" y="25" text-anchor="middle" font-size="8" fill="#007AFF">0.171</text>

          <rect x="78" y="0" width="68" height="30" rx="6" fill="#5856D6" opacity="0.1"/>
          <text x="112" y="13" text-anchor="middle" font-size="8" fill="#5856D6" font-weight="600">RMSE</text>
          <text x="112" y="25" text-anchor="middle" font-size="8" fill="#5856D6">0.229</text>

          <rect x="156" y="0" width="68" height="30" rx="6" fill="#FF9500" opacity="0.1"/>
          <text x="190" y="13" text-anchor="middle" font-size="8" fill="#FF9500" font-weight="600">R²</text>
          <text x="190" y="25" text-anchor="middle" font-size="8" fill="#FF9500">0.949</text>

          <rect x="234" y="0" width="68" height="30" rx="6" fill="#FF2D55" opacity="0.1"/>
          <text x="268" y="13" text-anchor="middle" font-size="8" fill="#FF2D55" font-weight="600">MAPE</text>
          <text x="268" y="25" text-anchor="middle" font-size="8" fill="#FF2D55">1.77%</text>
        </g>

        <text x="165" y="106" text-anchor="middle" font-size="8" fill="#86868B" font-style="italic">↑ 渭门桥站最佳结果</text>
      </g>
    </g>
  </g>

  <!-- ===== Arrow to Output ===== -->
  <line x1="728" y1="400" x2="770" y2="400" stroke="#5856D6" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- ===== PHASE 3: Outputs ===== -->
  <g transform="translate(780, 90)" font-family="-apple-system, 'PingFang SC', sans-serif">
    <rect x="0" y="0" width="24" height="550" rx="12" fill="url(#g5)" opacity="0.15"/>
    <text x="12" y="290" text-anchor="middle" font-size="11" fill="#FF2D55" font-weight="700" transform="rotate(-90, 12, 290)">训练产出</text>

    <!-- Output cards -->
    <g transform="translate(36, 10)">
      <!-- model.pt -->
      <rect x="0" y="0" width="200" height="70" rx="12" fill="#fff" filter="url(#sh)"/>
      <rect x="0" y="0" width="52" height="70" rx="12" fill="url(#g4)" opacity="0.9"/>
      <rect x="26" y="0" width="26" height="70" fill="url(#g4)" opacity="0.9"/>
      <text x="26" y="40" text-anchor="middle" font-size="18" fill="#fff">🧠</text>
      <text x="126" y="28" text-anchor="middle" font-size="11" fill="#1D1D1F" font-weight="600">model.pt</text>
      <text x="126" y="44" text-anchor="middle" font-size="9" fill="#86868B">模型权重文件</text>
      <text x="126" y="58" text-anchor="middle" font-size="8" fill="#86868B">7站 × 独立模型</text>
    </g>

    <g transform="translate(36, 86)">
      <rect x="0" y="0" width="200" height="70" rx="12" fill="#fff" filter="url(#sh)"/>
      <rect x="0" y="0" width="52" height="70" rx="12" fill="url(#g2)" opacity="0.9"/>
      <rect x="26" y="0" width="26" height="70" fill="url(#g2)" opacity="0.9"/>
      <text x="26" y="40" text-anchor="middle" font-size="18" fill="#fff">📐</text>
      <text x="126" y="28" text-anchor="middle" font-size="11" fill="#1D1D1F" font-weight="600">scaler.pkl</text>
      <text x="126" y="44" text-anchor="middle" font-size="9" fill="#86868B">StandardScaler</text>
      <text x="126" y="58" text-anchor="middle" font-size="8" fill="#86868B">推理时反标准化</text>
    </g>

    <g transform="translate(36, 172)">
      <rect x="0" y="0" width="200" height="70" rx="12" fill="#fff" filter="url(#sh)"/>
      <rect x="0" y="0" width="52" height="70" rx="12" fill="url(#g3)" opacity="0.9"/>
      <rect x="26" y="0" width="26" height="70" fill="url(#g3)" opacity="0.9"/>
      <text x="26" y="40" text-anchor="middle" font-size="18" fill="#fff">📊</text>
      <text x="126" y="28" text-anchor="middle" font-size="11" fill="#1D1D1F" font-weight="600">train_result.json</text>
      <text x="126" y="44" text-anchor="middle" font-size="9" fill="#86868B">训练指标 + 超参数</text>
      <text x="126" y="58" text-anchor="middle" font-size="8" fill="#86868B">R²/MAE/RMSE/MAPE</text>
    </g>

    <g transform="translate(36, 258)">
      <rect x="0" y="0" width="200" height="70" rx="12" fill="#fff" filter="url(#sh)"/>
      <rect x="0" y="0" width="52" height="70" rx="12" fill="url(#g1)" opacity="0.9"/>
      <rect x="26" y="0" width="26" height="70" fill="url(#g1)" opacity="0.9"/>
      <text x="26" y="40" text-anchor="middle" font-size="18" fill="#fff">📉</text>
      <text x="126" y="28" text-anchor="middle" font-size="11" fill="#1D1D1F" font-weight="600">loss_curves.npz</text>
      <text x="126" y="44" text-anchor="middle" font-size="9" fill="#86868B">训练/验证损失曲线</text>
      <text x="126" y="58" text-anchor="middle" font-size="8" fill="#86868B">每epoch记录</text>
    </g>

    <g transform="translate(36, 344)">
      <rect x="0" y="0" width="200" height="70" rx="12" fill="#fff" filter="url(#sh)"/>
      <rect x="0" y="0" width="52" height="70" rx="12" fill="url(#g5)" opacity="0.9"/>
      <rect x="26" y="0" width="26" height="70" fill="url(#g5)" opacity="0.9"/>
      <text x="26" y="40" text-anchor="middle" font-size="18" fill="#fff">🔮</text>
      <text x="126" y="28" text-anchor="middle" font-size="11" fill="#1D1D1F" font-weight="600">test_predictions.csv</text>
      <text x="126" y="44" text-anchor="middle" font-size="9" fill="#86868B">实际DO vs 预测DO</text>
      <text x="126" y="58" text-anchor="middle" font-size="8" fill="#86868B">6步 × ~850行/站</text>
    </g>

    <!-- Arrow to downstream -->
    <g transform="translate(36, 432)">
      <rect x="0" y="0" width="200" height="108" rx="12" fill="#fff" filter="url(#sh)" stroke="#AF52DE" stroke-width="1"/>
      <rect x="0" y="0" width="200" height="36" rx="12" fill="url(#g6)"/>
      <rect x="0" y="22" width="200" height="14" fill="url(#g6)"/>
      <text x="100" y="24" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">⬇ 下游消费</text>
      <text x="15" y="52" font-size="9" fill="#1D1D1F">→ 特征重要性分析</text>
      <text x="15" y="68" font-size="9" fill="#1D1D1F">→ 知识图谱构建</text>
      <text x="15" y="84" font-size="9" fill="#1D1D1F">→ 24h预测推理</text>
      <text x="15" y="100" font-size="9" fill="#1D1D1F">→ Streamlit 可视化</text>
    </g>
  </g>

  <!-- ===== Bottom: 7 stations bar ===== -->
  <g transform="translate(25, 660)" font-family="-apple-system, 'PingFang SC', sans-serif">
    <rect x="0" y="0" width="1350" height="30" rx="10" fill="#F5F5F7" stroke="#E5E5EA" stroke-width="0.8"/>
    <text x="20" y="20" font-size="10" fill="#1D1D1F" font-weight="600">逐站独立训练:</text>

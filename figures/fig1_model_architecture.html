<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>LSTM+Attention 模型架构图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif; }
  svg text { font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', 'PingFang SC', sans-serif; }
</style>
</head>
<body>
<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5F7FF"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="inputGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#005EC4"/>
    </linearGradient>
    <linearGradient id="lstmGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5856D6"/>
      <stop offset="100%" stop-color="#3634A3"/>
    </linearGradient>
    <linearGradient id="attnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF9500"/>
      <stop offset="100%" stop-color="#E08600"/>
    </linearGradient>
    <linearGradient id="fcGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34C759"/>
      <stop offset="100%" stop-color="#248A3D"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF2D55"/>
      <stop offset="100%" stop-color="#D70040"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowDeep" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#007AFF"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#86868B"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF9500"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="url(#bgGrad)" rx="0"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#1D1D1F" letter-spacing="0.5">LSTM + Attention 多步水质预测模型架构</text>
  <text x="600" y="64" text-anchor="middle" font-size="13" fill="#86868B">WaterQualityLSTM — 回看72小时，预测未来24小时溶解氧(DO)</text>

  <!-- ==================== INPUT SECTION ==================== -->
  <g transform="translate(30, 100)">
    <!-- Input block -->
    <rect x="0" y="0" width="160" height="520" rx="16" fill="#fff" stroke="#007AFF" stroke-width="1.5" filter="url(#shadow)" opacity="0.95"/>
    <rect x="0" y="0" width="160" height="44" rx="16" fill="url(#inputGrad)"/>
    <rect x="0" y="28" width="160" height="16" fill="url(#inputGrad)"/>
    <text x="80" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">输入张量</text>

    <!-- Tensor shape -->
    <text x="80" y="68" text-anchor="middle" font-size="11" fill="#1D1D1F" font-weight="600">(batch, 18, 19)</text>
    <text x="80" y="85" text-anchor="middle" font-size="10" fill="#86868B">18步 × 19维特征</text>

    <!-- Time steps column -->
    <text x="30" y="112" font-size="9" fill="#5856D6" font-weight="600">时间步</text>
    <text x="110" y="112" font-size="9" fill="#007AFF" font-weight="600">特征</text>

    <!-- Time step boxes -->
    <g transform="translate(10, 120)">
      <rect x="0" y="0" width="55" height="22" rx="5" fill="#F0EEFF" stroke="#5856D6" stroke-width="0.8"/>
      <text x="27" y="15" text-anchor="middle" font-size="9" fill="#5856D6">t-18 (72h)</text>
      <rect x="0" y="28" width="55" height="22" rx="5" fill="#F0EEFF" stroke="#5856D6" stroke-width="0.8"/>
      <text x="27" y="43" text-anchor="middle" font-size="9" fill="#5856D6">t-17 (68h)</text>
      <rect x="0" y="56" width="55" height="22" rx="5" fill="#F0EEFF" stroke="#5856D6" stroke-width="0.8"/>
      <text x="27" y="71" text-anchor="middle" font-size="9" fill="#5856D6">t-16 (64h)</text>

      <!-- Dots -->
      <circle cx="27" cy="92" r="2" fill="#5856D6"/>
      <circle cx="27" cy="102" r="2" fill="#5856D6"/>
      <circle cx="27" cy="112" r="2" fill="#5856D6"/>

      <rect x="0" y="122" width="55" height="22" rx="5" fill="#F0EEFF" stroke="#5856D6" stroke-width="0.8"/>
      <text x="27" y="137" text-anchor="middle" font-size="9" fill="#5856D6">t-3 (12h)</text>
      <rect x="0" y="150" width="55" height="22" rx="5" fill="#F0EEFF" stroke="#5856D6" stroke-width="0.8"/>
      <text x="27" y="165" text-anchor="middle" font-size="9" fill="#5856D6">t-2 (8h)</text>
      <rect x="0" y="178" width="55" height="22" rx="5" fill="#E8E5FF" stroke="#5856D6" stroke-width="1.2"/>
      <text x="27" y="193" text-anchor="middle" font-size="9" fill="#5856D6" font-weight="600">t-1 (4h)</text>
    </g>

    <!-- Feature list -->
    <g transform="translate(75, 120)">
      <rect x="0" y="0" width="70" height="18" rx="4" fill="#E3F2FF"/>
      <text x="35" y="13" text-anchor="middle" font-size="8" fill="#007AFF">水温</text>
      <rect x="0" y="21" width="70" height="18" rx="4" fill="#E3F2FF"/>
      <text x="35" y="34" text-anchor="middle" font-size="8" fill="#007AFF">pH</text>
      <rect x="0" y="42" width="70" height="18" rx="4" fill="#E3F2FF"/>
      <text x="35" y="55" text-anchor="middle" font-size="8" fill="#007AFF">溶解氧(DO)</text>
      <rect x="0" y="63" width="70" height="18" rx="4" fill="#E3F2FF"/>
      <text x="35" y="76" text-anchor="middle" font-size="8" fill="#007AFF">电导率/浊度...</text>
      <rect x="0" y="84" width="70" height="18" rx="4" fill="#E3F2FF"/>
      <text x="35" y="97" text-anchor="middle" font-size="8" fill="#007AFF">氨氮/总磷/总氮</text>

      <rect x="0" y="110" width="70" height="18" rx="4" fill="#E8FAE8"/>
      <text x="35" y="123" text-anchor="middle" font-size="8" fill="#34C759">hour_sin/cos</text>
      <rect x="0" y="131" width="70" height="18" rx="4" fill="#E8FAE8"/>
      <text x="35" y="144" text-anchor="middle" font-size="8" fill="#34C759">dayofyear_s/c</text>

      <rect x="0" y="157" width="70" height="18" rx="4" fill="#FFF3E0"/>
      <text x="35" y="170" text-anchor="middle" font-size="8" fill="#FF9500">DO_24h_mean</text>
      <rect x="0" y="178" width="70" height="18" rx="4" fill="#FFF3E0"/>
      <text x="35" y="191" text-anchor="middle" font-size="8" fill="#FF9500">DO_diff/std...</text>
    </g>

    <!-- Legend in input -->
    <g transform="translate(15, 340)">
      <rect x="0" y="0" width="130" height="78" rx="8" fill="#FAFAFA" stroke="#E5E5EA" stroke-width="0.8"/>
      <rect x="10" y="12" width="10" height="10" rx="2" fill="#E3F2FF" stroke="#007AFF" stroke-width="0.6"/>
      <text x="26" y="21" font-size="9" fill="#1D1D1F">9个水质参数</text>
      <rect x="10" y="30" width="10" height="10" rx="2" fill="#E8FAE8" stroke="#34C759" stroke-width="0.6"/>
      <text x="26" y="39" font-size="9" fill="#1D1D1F">4个时间编码</text>
      <rect x="10" y="48" width="10" height="10" rx="2" fill="#FFF3E0" stroke="#FF9500" stroke-width="0.6"/>
      <text x="26" y="57" font-size="9" fill="#1D1D1F">6个滚动趋势</text>
      <line x1="10" y1="67" x2="50" y2="67" stroke="#86868B" stroke-width="1" stroke-dasharray="2,2"/>
      <text x="56" y="71" font-size="9" fill="#86868B">共19维</text>
    </g>

    <text x="80" y="505" text-anchor="middle" font-size="10" fill="#86868B" font-style="italic">每4小时一个时间步</text>
  </g>

  <!-- Arrow: Input -> LSTM -->
  <line x1="195" y1="360" x2="240" y2="360" stroke="#007AFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- ==================== LSTM SECTION ==================== -->
  <g transform="translate(250, 120)">
    <rect x="0" y="0" width="220" height="480" rx="16" fill="#fff" stroke="#5856D6" stroke-width="1.5" filter="url(#shadowDeep)" opacity="0.95"/>
    <rect x="0" y="0" width="220" height="44" rx="16" fill="url(#lstmGrad)"/>
    <rect x="0" y="28" width="220" height="16" fill="url(#lstmGrad)"/>
    <text x="110" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">2层堆叠 LSTM</text>

    <!-- LSTM Layer 1 -->
    <g transform="translate(15, 60)">
      <rect x="0" y="0" width="190" height="170" rx="12" fill="#F8F7FF" stroke="#5856D6" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="95" y="20" text-anchor="middle" font-size="11" fill="#5856D6" font-weight="600">LSTM Layer 1</text>
      <!-- LSTM cells -->
      <g transform="translate(10, 32)">
        <rect x="0" y="0" width="40" height="36" rx="6" fill="#E8E5FF" stroke="#5856D6" stroke-width="1"/>
        <text x="20" y="15" text-anchor="middle" font-size="8" fill="#5856D6" font-weight="500">LSTM</text>
        <text x="20" y="28" text-anchor="middle" font-size="7" fill="#86868B">h=96</text>

        <rect x="52" y="0" width="40" height="36" rx="6" fill="#E8E5FF" stroke="#5856D6" stroke-width="1"/>
        <text x="72" y="15" text-anchor="middle" font-size="8" fill="#5856D6" font-weight="500">LSTM</text>
        <text x="72" y="28" text-anchor="middle" font-size="7" fill="#86868B">h=96</text>

        <text x="102" y="20" font-size="14" fill="#5856D6">...</text>

        <rect x="120" y="0" width="40" height="36" rx="6" fill="#E8E5FF" stroke="#5856D6" stroke-width="1"/>
        <text x="140" y="15" text-anchor="middle" font-size="8" fill="#5856D6" font-weight="500">LSTM</text>
        <text x="140" y="28" text-anchor="middle" font-size="7" fill="#86868B">h=96</text>

        <!-- Recurrent arrows -->
        <path d="M40,18 Q46,8 52,18" fill="none" stroke="#5856D6" stroke-width="0.8" marker-end="url(#arrowGray)"/>
        <path d="M92,18 Q98,8 104,18" fill="none" stroke="#5856D6" stroke-width="0.8"/>
      </g>

      <text x="95" y="86" text-anchor="middle" font-size="9" fill="#86868B">18个时间步展开 → 输出 (batch, 18, 96)</text>

      <!-- Gates illustration -->
      <g transform="translate(20, 96)">
        <rect x="0" y="0" width="150" height="55" rx="8" fill="#FAFAFA" stroke="#E5E5EA" stroke-width="0.6"/>
        <text x="75" y="15" text-anchor="middle" font-size="8" fill="#86868B">门控机制</text>
        <rect x="8" y="22" width="38" height="18" rx="4" fill="#E8E5FF"/>
        <text x="27" y="34" text-anchor="middle" font-size="7" fill="#5856D6">遗忘门</text>
        <rect x="52" y="22" width="38" height="18" rx="4" fill="#E8E5FF"/>
        <text x="71" y="34" text-anchor="middle" font-size="7" fill="#5856D6">输入门</text>
        <rect x="96" y="22" width="46" height="18" rx="4" fill="#E8E5FF"/>
        <text x="119" y="34" text-anchor="middle" font-size="7" fill="#5856D6">输出门</text>
      </g>
    </g>

    <!-- Dropout label -->
    <text x="110" y="248" text-anchor="middle" font-size="10" fill="#86868B">Dropout = 0.2</text>
    <line x1="30" y1="255" x2="190" y2="255" stroke="#E5E5EA" stroke-width="1" stroke-dasharray="4,3"/>

    <!-- LSTM Layer 2 -->
    <g transform="translate(15, 268)">
      <rect x="0" y="0" width="190" height="90" rx="12" fill="#F8F7FF" stroke="#5856D6" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="95" y="20" text-anchor="middle" font-size="11" fill="#5856D6" font-weight="600">LSTM Layer 2</text>
      <g transform="translate(10, 32)">
        <rect x="0" y="0" width="40" height="36" rx="6" fill="#E8E5FF" stroke="#5856D6" stroke-width="1"/>
        <text x="20" y="15" text-anchor="middle" font-size="8" fill="#5856D6" font-weight="500">LSTM</text>
        <text x="20" y="28" text-anchor="middle" font-size="7" fill="#86868B">h=96</text>
        <rect x="52" y="0" width="40" height="36" rx="6" fill="#E8E5FF" stroke="#5856D6" stroke-width="1"/>
        <text x="72" y="15" text-anchor="middle" font-size="8" fill="#5856D6" font-weight="500">LSTM</text>
        <text x="72" y="28" text-anchor="middle" font-size="7" fill="#86868B">h=96</text>
        <text x="102" y="20" font-size="14" fill="#5856D6">...</text>
        <rect x="120" y="0" width="40" height="36" rx="6" fill="#E8E5FF" stroke="#5856D6" stroke-width="1"/>
        <text x="140" y="15" text-anchor="middle" font-size="8" fill="#5856D6" font-weight="500">LSTM</text>
        <text x="140" y="28" text-anchor="middle" font-size="7" fill="#86868B">h=96</text>
        <path d="M40,18 Q46,8 52,18" fill="none" stroke="#5856D6" stroke-width="0.8"/>
        <path d="M92,18 Q98,8 104,18" fill="none" stroke="#5856D6" stroke-width="0.8"/>
      </g>
    </g>

    <text x="110" y="382" text-anchor="middle" font-size="10" fill="#1D1D1F" font-weight="500">输出: (batch, 18, 96)</text>
    <text x="110" y="396" text-anchor="middle" font-size="9" fill="#86868B">所有时间步的隐状态</text>

    <!-- Bottom info -->
    <g transform="translate(15, 415)">
      <rect x="0" y="0" width="190" height="48" rx="8" fill="#FAFAFA" stroke="#E5E5EA" stroke-width="0.8"/>
      <text x="95" y="18" text-anchor="middle" font-size="9" fill="#1D1D1F" font-weight="500">nn.LSTM 配置</text>
      <text x="95" y="36" text-anchor="middle" font-size="8" fill="#86868B">input=19  hidden=96  layers=2  dropout=0.2</text>
    </g>
  </g>

  <!-- Arrow: LSTM -> Attention -->
  <line x1="475" y1="360" x2="520" y2="360" stroke="#5856D6" stroke-width="2.5" marker-end="url(#arrowGray)"/>

  <!-- ==================== ATTENTION SECTION ==================== -->
  <g transform="translate(530, 120)">
    <rect x="0" y="0" width="240" height="480" rx="16" fill="#fff" stroke="#FF9500" stroke-width="1.5" filter="url(#shadowDeep)" opacity="0.95"/>
    <rect x="0" y="0" width="240" height="44" rx="16" fill="url(#attnGrad)"/>
    <rect x="0" y="28" width="240" height="16" fill="url(#attnGrad)"/>
    <text x="120" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Attention 注意力机制</text>

    <!-- Step 1: Linear -->
    <g transform="translate(15, 60)">
      <rect x="0" y="0" width="210" height="56" rx="10" fill="#FFF8EE" stroke="#FF9500" stroke-width="1"/>
      <text x="105" y="18" text-anchor="middle" font-size="10" fill="#FF9500" font-weight="600">Step 1: 注意力打分</text>
      <text x="105" y="34" text-anchor="middle" font-size="11" fill="#1D1D1F" font-weight="500">Linear(96 → 1)</text>
      <text x="105" y="48" text-anchor="middle" font-size="9" fill="#86868B">attn_scores: (batch, 18)</text>
    </g>

    <!-- Arrow -->
    <line x1="120" y1="122" x2="120" y2="140" stroke="#FF9500" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

    <!-- Step 2: Softmax -->
    <g transform="translate(15, 146)">
      <rect x="0" y="0" width="210" height="56" rx="10" fill="#FFF8EE" stroke="#FF9500" stroke-width="1"/>
      <text x="105" y="18" text-anchor="middle" font-size="10" fill="#FF9500" font-weight="600">Step 2: Softmax 归一化</text>
      <text x="105" y="34" text-anchor="middle" font-size="11" fill="#1D1D1F" font-weight="500">α = Softmax(scores)</text>
      <text x="105" y="48" text-anchor="middle" font-size="9" fill="#86868B">attn_weights: (batch, 18) 权重和=1</text>
    </g>

    <!-- Attention weights visualization -->
    <g transform="translate(25, 218)">
      <text x="95" y="0" text-anchor="middle" font-size="9" fill="#86868B">注意力权重分布（渭门桥站实测）</text>
      <!-- Heat bars for each timestep -->
      <g transform="translate(0, 10)">
        <rect x="0" y="0" width="8" height="20" rx="2" fill="#FFE8CC" opacity="0.4"/>
        <rect x="11" y="0" width="8" height="20" rx="2" fill="#FFE0B2" opacity="0.45"/>
        <rect x="22" y="0" width="8" height="20" rx="2" fill="#FFD699" opacity="0.5"/>
        <rect x="33" y="0" width="8" height="20" rx="2" fill="#FFCC80" opacity="0.55"/>
        <rect x="44" y="0" width="8" height="20" rx="2" fill="#FFC266" opacity="0.6"/>
        <rect x="55" y="0" width="8" height="20" rx="2" fill="#FFB84D" opacity="0.65"/>
        <rect x="66" y="0" width="8" height="20" rx="2" fill="#FFAD33" opacity="0.7"/>
        <rect x="77" y="0" width="8" height="20" rx="2" fill="#FFA31A" opacity="0.75"/>
        <rect x="88" y="0" width="8" height="20" rx="2" fill="#FF9900" opacity="0.8"/>
        <rect x="99" y="0" width="8" height="20" rx="2" fill="#FF8F00" opacity="0.82"/>
        <rect x="110" y="0" width="8" height="20" rx="2" fill="#FF8500" opacity="0.85"/>
        <rect x="121" y="0" width="8" height="20" rx="2" fill="#FF7B00" opacity="0.88"/>
        <rect x="132" y="0" width="8" height="20" rx="2" fill="#FF7100" opacity="0.9"/>
        <rect x="143" y="0" width="8" height="20" rx="2" fill="#FF6700" opacity="0.92"/>
        <rect x="154" y="0" width="8" height="20" rx="2" fill="#FF5D00" opacity="0.94"/>
        <rect x="165" y="0" width="8" height="20" rx="2" fill="#FF5300" opacity="0.96"/>
        <rect x="176" y="0" width="8" height="20" rx="2" fill="#FF4900" opacity="0.98"/>
        <rect x="187" y="0" width="8" height="20" rx="2" fill="#FF3F00"/>
        <text x="4" y="36" font-size="7" fill="#86868B">t-18</text>
        <text x="185" y="36" font-size="7" fill="#86868B">t-1</text>
        <text x="95" y="36" text-anchor="middle" font-size="7" fill="#86868B">← 权重递增 →</text>
      </g>
      <text x="95" y="52" text-anchor="middle" font-size="8" fill="#FF9500">0.009 → 0.171 （比值 ≈ 19:1）</text>
    </g>

    <!-- Arrow -->
    <line x1="120" y1="286" x2="120" y2="304" stroke="#FF9500" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

    <!-- Step 3: BMM -->
    <g transform="translate(15, 310)">
      <rect x="0" y="0" width="210" height="70" rx="10" fill="#FFF8EE" stroke="#FF9500" stroke-width="1"/>
      <text x="105" y="18" text-anchor="middle" font-size="10" fill="#FF9500" font-weight="600">Step 3: 加权求和</text>
      <text x="105" y="36" text-anchor="middle" font-size="11" fill="#1D1D1F" font-weight="500">context = α · H</text>
      <text x="105" y="52" text-anchor="middle" font-size="9" fill="#86868B">torch.bmm(α, LSTM_out)</text>
      <text x="105" y="64" text-anchor="middle" font-size="9" fill="#1D1D1F">→ context: (batch, 96)</text>
    </g>

    <!-- Explainability branch -->
    <g transform="translate(15, 400)">
      <rect x="0" y="0" width="210" height="62" rx="10" fill="#FFF0F0" stroke="#FF2D55" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="105" y="18" text-anchor="middle" font-size="10" fill="#FF2D55" font-weight="600">🔍 可解释性输出</text>
      <text x="105" y="36" text-anchor="middle" font-size="9" fill="#1D1D1F">return_attention=True 时</text>
      <text x="105" y="50" text-anchor="middle" font-size="9" fill="#86868B">导出 α 权重 → 特征归因分析</text>
    </g>
  </g>

  <!-- Arrow: Attention -> FC -->
  <line x1="775" y1="360" x2="820" y2="360" stroke="#FF9500" stroke-width="2.5" marker-end="url(#arrowOrange)"/>

  <!-- ==================== FC OUTPUT SECTION ==================== -->
  <g transform="translate(830, 150)">
    <rect x="0" y="0" width="160" height="420" rx="16" fill="#fff" stroke="#34C759" stroke-width="1.5" filter="url(#shadowDeep)" opacity="0.95"/>
